<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{% block title %}The Journal{% endblock %}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Be+Vietnam+Pro:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "on-background": "#1a1c1a",
        "tertiary-container": "#2d2d2a",
        "primary-fixed-dim": "#c8c6c6",
        "on-tertiary-fixed-variant": "#474743",
        "on-error": "#ffffff",
        "surface": "#faf9f6",
        "primary-container": "#2d2d2d",
        "on-tertiary-container": "#969490",
        "surface-container-high": "#e9e8e5",
        "on-secondary-fixed-variant": "#4a473e",
        "tertiary": "#181816",
        "surface-bright": "#faf9f6",
        "outline-variant": "#c4c7c7",
        "background": "#faf9f6",
        "secondary-fixed": "#e8e2d6",
        "surface-container": "#efeeeb",
        "secondary": "#625e55",
        "on-secondary-fixed": "#1e1c14",
        "inverse-primary": "#c8c6c6",
        "on-primary-fixed-variant": "#474747",
        "inverse-surface": "#2f312f",
        "tertiary-fixed": "#e5e2dd",
        "on-primary-container": "#959494",
        "on-secondary-container": "#68645b",
        "tertiary-fixed-dim": "#c9c6c2",
        "surface-variant": "#e3e2e0",
        "on-primary": "#ffffff",
        "outline": "#747878",
        "on-surface-variant": "#444748",
        "on-tertiary": "#ffffff",
        "inverse-on-surface": "#f2f1ee",
        "primary-fixed": "#e4e2e1",
        "surface-tint": "#5f5e5e",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#1a1c1a",
        "on-primary-fixed": "#1b1c1c",
        "surface-container-highest": "#e3e2e0",
        "on-error-container": "#93000a",
        "secondary-fixed-dim": "#cbc6ba",
        "surface-container-low": "#f4f3f1",
        "error": "#ba1a1a",
        "primary": "#181919",
        "surface-dim": "#dbdad7",
        "error-container": "#ffdad6",
        "secondary-container": "#e8e2d6",
        "on-tertiary-fixed": "#1c1c19",
        "on-secondary": "#ffffff"
      },
      borderRadius: {
        DEFAULT: "0.125rem",
        lg: "0.25rem",
        xl: "0.5rem",
        full: "0.75rem"
      },
      spacing: {
        "container-max": "1120px",
        "stack-lg": "64px",
        "margin-mobile": "20px",
        "stack-sm": "16px",
        "stack-md": "32px",
        "gutter": "24px",
        "base": "8px"
      },
      fontFamily: {
        "headline-xl": ["Newsreader"],
        "body-lg": ["Be Vietnam Pro"],
        "headline-lg": ["Newsreader"],
        "label-sm": ["Be Vietnam Pro"],
        "body-md": ["Be Vietnam Pro"],
        "label-md": ["Be Vietnam Pro"],
        "headline-md": ["Newsreader"]
      },
      fontSize: {
        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "500"}],
        "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "500"}],
        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
        "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}]
      }
    }
  }
}
</script>
<style>
  body {
    background-color: #faf9f6;
    color: #1a1c1a;
    -webkit-font-smoothing: antialiased;
    min-height: max(884px, 100dvh);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body class="font-body-md text-on-surface flex flex-col items-center min-h-screen">
<!-- TopAppBar -->
<header class="bg-[#F5F5F0] border-b border-[#E0E0D5] top-0 z-50 sticky w-full">
  <div class="flex justify-between items-center w-full h-16 px-6 max-w-screen-md mx-auto">
    <a href="/" class="text-[#2D2D2D] hover:bg-[#EBEBE0] transition-colors p-2 rounded-full">
      <span class="material-symbols-outlined" data-icon="menu">menu</span>
    </a>
    <a href="/" class="font-serif text-xl font-medium text-[#2D2D2D]">The Journal</a>
    <button class="text-[#2D2D2D] hover:bg-[#EBEBE0] transition-colors p-2 rounded-full">
      <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
    </button>
  </div>
</header>

{% block content %}{% endblock %}

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-8 bg-[#F5F5F0]/90 backdrop-blur-md border-t border-[#E0E0D5] shadow-[0_-4px_24px_rgba(45,45,45,0.04)]">
  <a href="/" class="flex flex-col items-center justify-center {% if active_page == 'feed' %}text-[#2D2D2D] scale-105{% else %}text-[#8C8C84] opacity-60 hover:text-[#2D2D2D]{% endif %} transition-colors">
    <span class="material-symbols-outlined mb-1" data-icon="article" {% if active_page == 'feed' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>article</span>
    <span class="font-sans text-[10px] uppercase tracking-widest font-medium">Feed</span>
  </a>
  <a href="/create" class="flex flex-col items-center justify-center {% if active_page == 'write' %}text-[#2D2D2D] scale-105{% else %}text-[#8C8C84] opacity-60 hover:text-[#2D2D2D]{% endif %} transition-colors">
    <span class="material-symbols-outlined mb-1" data-icon="edit_note" {% if active_page == 'write' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>edit_note</span>
    <span class="font-sans text-[10px] uppercase tracking-widest font-medium">Write</span>
  </a>
  <div class="flex flex-col items-center justify-center text-[#8C8C84] opacity-60">
    <span class="material-symbols-outlined mb-1" data-icon="auto_stories">auto_stories</span>
    <span class="font-sans text-[10px] uppercase tracking-widest font-medium">Library</span>
  </div>
</nav>
</body>
</html>

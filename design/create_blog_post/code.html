<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,ital,wght@6..72,0,200..800;6..72,1,200..800&amp;family=Be+Vietnam+Pro:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-background": "#1a1c1a",
                  "tertiary-container": "#2d2d2a",
                  "primary-fixed-dim": "#c8c6c6",
                  "on-tertiary-fixed-variant": "#474743",
                  "on-error": "#ffffff",
                  "surface": "#faf9f6",
                  "primary-container": "#2d2d2d",
                  "on-tertiary-container": "#969490",
                  "surface-container-high": "#e9e8e5",
                  "on-secondary-fixed-variant": "#4a473e",
                  "tertiary": "#181816",
                  "surface-bright": "#faf9f6",
                  "outline-variant": "#c4c7c7",
                  "background": "#faf9f6",
                  "secondary-fixed": "#e8e2d6",
                  "surface-container": "#efeeeb",
                  "secondary": "#625e55",
                  "on-secondary-fixed": "#1e1c14",
                  "inverse-primary": "#c8c6c6",
                  "on-primary-fixed-variant": "#474747",
                  "inverse-surface": "#2f312f",
                  "tertiary-fixed": "#e5e2dd",
                  "on-primary-container": "#959494",
                  "on-secondary-container": "#68645b",
                  "tertiary-fixed-dim": "#c9c6c2",
                  "surface-variant": "#e3e2e0",
                  "on-primary": "#ffffff",
                  "outline": "#747878",
                  "on-surface-variant": "#444748",
                  "on-tertiary": "#ffffff",
                  "inverse-on-surface": "#f2f1ee",
                  "primary-fixed": "#e4e2e1",
                  "surface-tint": "#5f5e5e",
                  "surface-container-lowest": "#ffffff",
                  "on-surface": "#1a1c1a",
                  "on-primary-fixed": "#1b1c1c",
                  "surface-container-highest": "#e3e2e0",
                  "on-error-container": "#93000a",
                  "secondary-fixed-dim": "#cbc6ba",
                  "surface-container-low": "#f4f3f1",
                  "error": "#ba1a1a",
                  "primary": "#181919",
                  "surface-dim": "#dbdad7",
                  "error-container": "#ffdad6",
                  "secondary-container": "#e8e2d6",
                  "on-tertiary-fixed": "#1c1c19",
                  "on-secondary": "#ffffff"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "spacing": {
                  "container-max": "1120px",
                  "stack-lg": "64px",
                  "margin-mobile": "20px",
                  "stack-sm": "16px",
                  "stack-md": "32px",
                  "gutter": "24px",
                  "base": "8px"
          },
          "fontFamily": {
                  "headline-xl": ["Newsreader"],
                  "body-lg": ["Be Vietnam Pro"],
                  "headline-lg": ["Newsreader"],
                  "label-sm": ["Be Vietnam Pro"],
                  "body-md": ["Be Vietnam Pro"],
                  "label-md": ["Be Vietnam Pro"],
                  "headline-md": ["Newsreader"]
          },
          "fontSize": {
                  "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "500"}],
                  "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
                  "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
                  "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "500"}],
                  "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                  "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                  "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#F5F5F0] dark:bg-[#1A1A1A] docked full-width top-0 z-50 border-b border-[#E0E0D5] dark:border-[#2D2D2D] w-full sticky">
<div class="flex justify-between items-center w-full h-16 px-6 max-w-screen-md mx-auto">
<button class="text-[#2D2D2D] dark:text-[#E2E2E2] hover:bg-[#EBEBE0] dark:hover:bg-[#252525] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-serif text-xl font-medium text-[#2D2D2D] dark:text-[#E2E2E2]">The Journal</h1>
<button class="text-[#2D2D2D] dark:text-[#E2E2E2] hover:bg-[#EBEBE0] dark:hover:bg-[#252525] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-1 w-full max-w-screen-md px-margin-mobile pt-stack-sm pb-32">
<!-- Reading Progress Indicator (Contextual) -->
<div class="fixed top-16 left-0 w-full h-[2px] bg-secondary-container z-40">
<div class="h-full bg-tertiary w-1/4"></div>
</div>
<!-- Meta Info Section -->
<div class="flex items-center gap-base mb-stack-sm mt-8 animate-fade-in">
<span class="font-label-sm text-label-sm text-secondary tracking-widest uppercase">Draft</span>
<span class="w-1 h-1 bg-secondary rounded-full"></span>
<span class="font-label-sm text-label-sm text-secondary tracking-widest uppercase">May 24, 2024</span>
</div>
<!-- Post Creator Form -->
<section class="flex flex-col space-y-stack-md">
<!-- Title Input Area -->
<div class="group border-b border-secondary/20 focus-within:border-tertiary transition-colors duration-300 pb-2">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-headline-xl text-headline-xl text-primary placeholder-primary/20 resize-none p-0 overflow-hidden" placeholder="Untitled Masterpiece" rows="2" spellcheck="false"></textarea>
</div>
<!-- Feature Image Placeholder (Editorial Style) -->
<div class="relative w-full aspect-[16/9] bg-surface-container overflow-hidden rounded-lg group cursor-pointer">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-500" data-alt="Abstract minimalist painting with soft earth tones and charcoal strokes on a textured linen canvas backdrop" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBoLFuhvNdpw_O4Yr0Sf5r5WiPF570SI3EUdbCHwixMTLfC1rt1uF_84_lLIEKT53MKap1TdgOl0oCUM6DvItqL406iRYxWC2lDfk46TDfeUdUW2BPEbqZjBTd4vK8r_1GKsu-xu7xQPEXJFw5YCKJbxoSUI6JsIfgofcO8aZPQz72wxyarpIc6s2cjrH3UqdlXOa_XjEMljtAkCuPUzQ6VSFdnAQD53oE9neOfqpl7uc6VU2xrlQoLmrPu4kWBXQRcBAKb45R5lig"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-surface/80 backdrop-blur-sm px-gutter py-stack-sm rounded-full flex items-center gap-2 border border-secondary/10">
<span class="material-symbols-outlined text-primary" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-md text-label-md text-primary">Add cover image</span>
</div>
</div>
</div>
<!-- Body Content Area -->
<div class="min-h-[400px]">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-secondary placeholder-secondary/40 resize-none p-0" placeholder="Begin your story here..." rows="15"></textarea>
</div>
<!-- Formatting Toolbar (Contextual) -->
<div class="flex items-center gap-gutter border-t border-secondary/10 pt-stack-sm pb-stack-lg overflow-x-auto scrollbar-hide">
<button class="flex items-center gap-1 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
</button>
<button class="flex items-center gap-1 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<button class="flex items-center gap-1 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_quote">format_quote</span>
</button>
<button class="flex items-center gap-1 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<button class="flex items-center gap-1 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="list">list</span>
</button>
<div class="h-4 w-px bg-secondary/20 mx-2"></div>
<button class="flex items-center gap-2 px-4 py-1.5 bg-secondary-container text-primary rounded-full hover:bg-secondary-fixed transition-colors whitespace-nowrap">
<span class="material-symbols-outlined text-[18px]" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm">SETTINGS</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#F5F5F0]/90 dark:bg-[#1A1A1A]/90 backdrop-blur-md flex justify-around items-center h-20 pb-safe px-8 border-t border-[#E0E0D5] dark:border-[#2D2D2D] shadow-[0_-4px_24px_rgba(45,45,45,0.04)]">
<!-- Feed -->
<a class="flex flex-col items-center justify-center text-[#8C8C84] dark:text-[#666666] opacity-60 hover:text-[#2D2D2D] dark:hover:text-[#E2E2E2]" href="#">
<span class="material-symbols-outlined" data-icon="article">article</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-medium mt-1">Feed</span>
</a>
<!-- Write (Active State) -->
<a class="flex flex-col items-center justify-center text-[#2D2D2D] dark:text-[#FFFFFF] scale-105 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-bold mt-1">Write</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-[#8C8C84] dark:text-[#666666] opacity-60 hover:text-[#2D2D2D] dark:hover:text-[#E2E2E2]" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-sans text-[10px] uppercase tracking-widest font-medium mt-1">Library</span>
</a>
</nav>
<!-- FAB (Contextual for Publish) -->
<button class="fixed bottom-24 right-6 bg-primary text-on-primary w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined" data-icon="publish">publish</span>
</button>
</body></html>
